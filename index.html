<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Hora do quiz!</h1>
        <p>Testando seus conhecimentos com esse quiz divertido!</p>
        <button id="start-btn">Começar Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Questões vão aqui</h2>
          <div class="quiz-info">
            <p>
              Questão <span id="current-question">1</span> de <span id="total-questions">5</span>
            </p>

            <p>Recorde: <span id="score">0</span></p>
          </div>
        </div>

        <div id="answers-container" class="answers-container">
          <!-- Answer buttons will be insterted here from our js code later at some point -->
        </div>

        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
      </div>

      <div id="result-screen" class="screen">
        <h1>Resultado do Quiz!</h1>
        <div class="result-info">
          <p>Seu recorde <span id="final-score">0</span> de <span id="max-score">5</span></p>

          <div id="result-message">Bom trabalho!</div>
        </div>
        <button id="restart-btn">Reiniciar Quiz</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
